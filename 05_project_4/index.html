<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess Number</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <h1>Number Guessing Game</h1>
    <p>Try and guess a random number between 1 and 100. You have <b style="color: rgb(190, 185, 124);">10 attempts</b> to guess the right number.</p>
    <br>
      <form class="form">

        <label for="guessfield" id="guess">Guess a Number: </label>

        <input type="text" id="guessfield" class="guessfield"><br>
        
        <input type="submit" id="subt" value="Submit" class="guesssubmit">
      </form>
      <div class="resultpara">
        <p>Previous Guesses: <span class="guesses"></span></p>
        <p>Guesses Remaining: <span class="lastresult">10</span></p>
        <p class="lowhigh"></p>
      </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
