<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM learning</title>
</head>
<body style="background-color: black;color:white">
  <ul class="language">
    <li>javascript</li>
  </ul>
</body>
<script>
  //----CREATION OF NEW ELEMENT , OPTIMIZED AND UNOPTIMIZED----//


  function addLanguage(langname){
    const li = document.createElement("li")
    li.innerHTML = `${langname}`  // USING INNERHTML IS NOT OPTIMIZED APPROACH
    document.querySelector(".language").appendChild(li)
  }
  addLanguage("python")
  addLanguage("c++")
  function addLanguageOpi (langname){
  const li = document.createElement("li")
  li.appendChild(document.createTextNode(langname))
  document.querySelector(".language").appendChild(li)
  }
  addLanguageOpi("Golang")
  addLanguageOpi("typescript")

</script>
